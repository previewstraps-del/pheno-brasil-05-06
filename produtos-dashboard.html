<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Produtos – PhenoBrasil</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --bg2: #141414; --bg3: #1c1c1c;
  --border: #2a2a2a; --gold: #c9a84c;
  --green: #3a7d44; --green2: #4caf50; --white: #f0ede8; --muted: #888; --red: #e05252;
}
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }
 
nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 70px; }
.nav-logo h2 { font-family: 'Barlow Condensed'; font-weight: 800; letter-spacing: 1px; }
.nav-actions { display: flex; align-items: center; gap: 1rem; }
.nav-link-btn { background: transparent; border: 1px solid var(--border); color: var(--white); padding: 0.5rem 1rem; cursor: pointer; font-family: 'Barlow Condensed'; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; text-decoration: none; font-size: 0.9rem; transition: all 0.2s; display: inline-flex; align-items: center; border-radius: 2px; }
.nav-link-btn:hover { border-color: var(--gold); color: var(--gold); }
.logout-btn { background: transparent; border: 1px solid var(--red); color: var(--red); padding: 0.5rem 1rem; cursor: pointer; font-family: 'Barlow Condensed'; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.2s; border-radius: 2px; }
.logout-btn:hover { background: var(--red); color: #fff; }
 
.dashboard-container { max-width: 1100px; margin: 3rem auto; padding: 0 2rem; display: grid; grid-template-columns: 1fr 1.3fr; gap: 3rem; }
@media (max-width: 900px) { .dashboard-container { grid-template-columns: 1fr; } }
 
.card-box { background: var(--bg2); border: 1px solid var(--border); padding: 2rem; border-radius: 4px; border-top: 3px solid var(--gold); height: fit-content; }
.card-box h3 { font-family: 'Barlow Condensed'; font-size: 1.6rem; font-weight: 800; text-transform: uppercase; margin-bottom: 1.5rem; letter-spacing: 0.05em; }
 
.section-divider { font-family: 'Barlow Condensed'; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--gold); letter-spacing: 0.1em; margin: 1.5rem 0 1rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
 
.form-group { margin-bottom: 1.2rem; }
.form-group label { display: block; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; letter-spacing: 0.05em; }
.form-group input,
.form-group select,
.form-group textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--white); padding: 0.75rem 1rem; font-family: 'Barlow', sans-serif; font-size: 0.9rem; outline: none; border-radius: 2px; }
.form-group textarea { resize: vertical; min-height: 90px; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
 
/* TAG INPUT (tamanhos/variantes) */
.tag-section { margin-bottom: 1.2rem; }
.tag-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
.tag-section-header label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; }
.add-variant-btn { background: transparent; border: 1px dashed var(--border); color: var(--muted); padding: 0.3rem 0.7rem; font-family: 'Barlow Condensed'; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: all 0.2s; display: flex; align-items: center; gap: 0.3rem; }
.add-variant-btn:hover { border-color: var(--gold); color: var(--gold); }
 
.variante-grupo { background: var(--bg3); border: 1px solid var(--border); border-radius: 2px; padding: 0.8rem; margin-bottom: 0.6rem; }
.variante-grupo-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
.variante-grupo-header input { flex: 1; background: var(--bg2); border: 1px solid var(--border); color: var(--white); padding: 0.4rem 0.7rem; font-family: 'Barlow Condensed'; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; border-radius: 2px; outline: none; }
.variante-grupo-header input:focus { border-color: var(--gold); }
.remove-grupo-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; line-height: 1; transition: color 0.2s; }
.remove-grupo-btn:hover { color: var(--red); }
 
.tag-input-wrap { display: flex; flex-wrap: wrap; gap: 0.4rem; background: var(--bg2); border: 1px solid var(--border); padding: 0.5rem; border-radius: 2px; min-height: 40px; align-items: center; cursor: text; }
.tag-input-wrap:focus-within { border-color: var(--gold); }
.tag { background: var(--bg3); border: 1px solid var(--border); color: var(--white); padding: 0.2rem 0.6rem; border-radius: 2px; font-size: 0.8rem; display: flex; align-items: center; gap: 0.3rem; }
.tag-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; line-height: 1; padding: 0; }
.tag-remove:hover { color: var(--red); }
.tag-input { background: none; border: none; color: var(--white); font-family: 'Barlow', sans-serif; font-size: 0.85rem; outline: none; min-width: 80px; flex: 1; padding: 0.1rem 0.2rem; }
 
/* BOTÕES */
.submit-btn { width: 100%; background: var(--green); color: #fff; border: none; padding: 0.9rem; font-family: 'Barlow Condensed'; font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; border-radius: 2px; }
.submit-btn:hover { background: var(--green2); }
.cancel-btn { width: 100%; background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 0.6rem; font-family: 'Barlow Condensed'; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; cursor: pointer; margin-top: 0.5rem; display: none; border-radius: 2px; }
 
/* LISTA DE PRODUTOS */
.product-item { background: var(--bg3); border: 1px solid var(--border); padding: 1rem; border-radius: 2px; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
.product-item-img { width: 52px; height: 52px; object-fit: cover; border-radius: 2px; border: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); }
.product-info { flex: 1; min-width: 0; }
.product-info h4 { font-family: 'Barlow Condensed'; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-info p { color: var(--muted); font-size: 0.82rem; margin-top: 0.2rem; }
.product-meta { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; flex-shrink: 0; }
.price-tag { color: var(--gold); font-weight: 700; font-family: 'Barlow Condensed'; font-size: 1.1rem; }
.action-btns { display: flex; gap: 0.4rem; }
.edit-btn { background: var(--gold); color: #000; border: none; padding: 0.3rem 0.8rem; font-family: 'Barlow Condensed'; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: opacity 0.2s; }
.edit-btn:hover { opacity: 0.85; }
.del-btn { background: transparent; color: var(--red); border: 1px solid var(--red); padding: 0.3rem 0.8rem; font-family: 'Barlow Condensed'; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
.del-btn:hover { background: var(--red); color: #fff; }
 
/* MODAL PERFIL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-box { background: var(--bg2); border: 1px solid var(--border); border-top: 3px solid var(--gold); max-width: 400px; width: 90%; padding: 2rem; border-radius: 4px; position: relative; }
.modal-box h3 { font-family: 'Barlow Condensed'; font-size: 1.4rem; font-weight: 800; text-transform: uppercase; color: var(--gold); margin-bottom: 1.2rem; }
.modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--white); font-size: 1.4rem; cursor: pointer; }
</style>
</head>
 
<!-- MODAL PERFIL -->
<div id="modal-perfil" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" onclick="window.fecharModalPerfil()">&times;</button>
    <h3>Editar Perfil</h3>
    <form onsubmit="window.salvarPerfil(event)">
      <div class="form-group"><label>Nome</label><input type="text" id="perfil-nome"></div>
      <div class="form-group"><label>Foto (URL)</label><input type="url" id="perfil-foto"></div>
      <hr style="border:0;border-top:1px solid var(--border);margin:1rem 0;">
      <p style="font-size:0.8rem;color:var(--muted);margin-bottom:0.8rem;">Alterar senha:</p>
      <div class="form-group"><label>Senha Atual</label><input type="password" id="current-pass"></div>
      <div class="form-group"><label>Nova Senha</label><input type="password" id="new-pass"></div>
      <div class="form-group"><label>Confirmar Nova Senha</label><input type="password" id="confirm-pass"></div>
      <button type="submit" class="submit-btn">Salvar Alterações</button>
      <button type="button" class="cancel-btn" style="display:block;border-color:var(--red);color:var(--red);" onclick="window.fecharModalPerfil()">Cancelar</button>
    </form>
  </div>
</div>
 
<body>
 
<script type="module">
    import { db, auth } from './nav.js'; // Certifique-se que 'auth' está exportado em nav.js
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
 
    // 1. Monitora o estado de login
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
 
        try {
            // 2. Busca os dados do usuário no Firestore
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
 
            if (userSnap.exists()) {
                const userData = userSnap.data();
                
                // 3. Lógica de Validação: Verifique o nome do seu campo aqui
                // Exemplo: campo 'cargo' ou 'role'
                if (userData.role !== 'vendedor') {
                    alert("❌ ACESSO NEGADO ❌  \n Você não possui essa credencial.");
                    window.location.href = 'index.html';
                } else {
                    // Se passar, libera o conteúdo da página
                    document.body.style.display = 'block'; 
                    console.log("Acesso autorizado!");
                }
            } else {
                window.location.href = 'index.html';
            }
        } catch (error) {
            console.error("Erro na validação:", error);
            window.location.href = 'index.html';
        }
    });
</script>
 
 
 
<nav>
  <div class="nav-logo">
    <h2>PAINEL DE <span style="color:var(--gold)">PRODUTOS</span></h2>
  </div>
  <div class="nav-actions">
    <a href="index.html" class="nav-link-btn">🏠 Página Inicial</a>
    <button class="nav-link-btn" onclick="window.abrirModalPerfil()" style="border-color:var(--gold);color:var(--gold);">⚙️ Meu Perfil</button>
    <button class="logout-btn" onclick="window.fazerLogout()">Sair</button>
  </div>
</nav>
 
<div class="dashboard-container">
  <!-- FORMULÁRIO -->
  <div class="card-box">
    <h3 id="form-title">Novo Produto</h3>
    <form id="product-form" onsubmit="window.salvarProduto(event)">
      <input type="hidden" id="prod-id">
 
      <div class="section-divider">Informações Básicas</div>
      <div class="form-group">
        <label>Nome do Produto</label>
        <input type="text" id="prod-name" placeholder="Ex: Camiseta PhenoBrasil" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Preço (R$)</label>
          <input type="number" id="prod-price" placeholder="Ex: 89" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <select id="prod-categoria">
            <option value="Roupas">Roupas</option>
            <option value="Impressão 3D">Impressão 3D</option>
            <option value="Acessório">Acessório</option>
            <option value="Moletom">Moletom</option>
            <option value="Calça">Calça</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Estoque (unidades)</label>
          <input type="number" id="prod-estoque" placeholder="Ex: 10" min="0">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="prod-status">
            <option value="ativo">Ativo</option>
            <option value="esgotado">Esgotado</option>
            <option value="inativo">Inativo</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>URL da Imagem</label>
        <input type="url" id="prod-image" placeholder="https://exemplo.com/foto.jpg">
      </div>
      <div class="form-group">
        <label>Descrição</label>
        <textarea id="prod-desc" placeholder="Descreva o produto, material, detalhes..."></textarea>
      </div>
 
      <div class="section-divider">Variantes</div>
      <div class="tag-section">
        <div class="tag-section-header">
          <label>Grupos de variantes (tamanhos, cores, etc.)</label>
          <button type="button" class="add-variant-btn" onclick="window.adicionarGrupo()">+ Adicionar grupo</button>
        </div>
        <div id="variantes-container"></div>
      </div>
 
      <button type="submit" id="btn-submit-text" class="submit-btn">Adicionar à Loja</button>
      <button type="button" id="btn-cancel-edit" class="cancel-btn" onclick="window.cancelarEdicao()">Cancelar Edição</button>
    </form>
  </div>
 
  <!-- LISTA -->
  <div class="card-box">
    <h3>Meus Produtos</h3>
    <div id="products-list"><p style="color:var(--muted)">Carregando...</p></div>
  </div>
</div>
 
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, query, where, getDocs, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
 
  const firebaseConfig = {
    apiKey: "AIzaSyAJTlL-4piG67VOM_y480dhyib2qaF3Bso",
    authDomain: "phenobrasil.firebaseapp.com",
    projectId: "phenobrasil",
    storageBucket: "phenobrasil.firebasestorage.app",
    messagingSenderId: "825755980394",
    appId: "1:825755980394:web:caad888821d128fb133013"
  };
 
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
 
  let usuarioAtual = null;
  let produtosLocais = [];
  let executandoLogout = false;
  let gruposVariantes = []; // [{ id, nome, tags[] }]
 
  // ── AUTH ─────────────────────────────────────────────────
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      try {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (!userDoc.exists() || userDoc.data().desativado === true) {
          await signOut(auth);
          alert("❌Acesso restrito a vendedores.❌");
          location.href = 'index.html'; return;
        }
        const role = userDoc.data().role;
        if (role !== 'vendedor' && role !== 'admin, breeder, usuario') {
          alert("❌Acesso restrito a vendedores.❌");
          location.href = 'index.html'; return;
        }
      } catch(e) { console.error(e); }
      usuarioAtual = user;
      window.carregarProdutos();
    } else {
      if (!executandoLogout) location.href = 'index.html';
    }
  });
 
  // ── VARIANTES ─────────────────────────────────────────────
  let grupoIdCounter = 0;
 
  window.adicionarGrupo = (nomeInicial = '', tagsIniciais = []) => {
    const id = grupoIdCounter++;
    const grupo = { id, nome: nomeInicial, tags: [...tagsIniciais] };
    gruposVariantes.push(grupo);
    renderGrupos();
  };
 
  const renderGrupos = () => {
    const container = document.getElementById('variantes-container');
    container.innerHTML = '';
    gruposVariantes.forEach((grupo, idx) => {
      const div = document.createElement('div');
      div.className = 'variante-grupo';
      div.innerHTML = `
        <div class="variante-grupo-header">
          <input type="text" placeholder="Nome do grupo (ex: Tamanho, Cor)"
            value="${grupo.nome}"
            oninput="window.atualizarNomeGrupo(${idx}, this.value)">
          <button type="button" class="remove-grupo-btn" onclick="window.removerGrupo(${idx})">×</button>
        </div>
        <div class="tag-input-wrap" id="tags-wrap-${idx}" onclick="document.getElementById('tag-input-${idx}').focus()">
          ${grupo.tags.map((t, ti) => `
            <span class="tag">${t}
              <button type="button" class="tag-remove" onclick="window.removerTag(${idx},${ti})">×</button>
            </span>`).join('')}
          <input class="tag-input" id="tag-input-${idx}" placeholder="Digite e pressione Enter"
            onkeydown="window.adicionarTag(event, ${idx})">
        </div>`;
      container.appendChild(div);
    });
  };
 
  window.atualizarNomeGrupo = (idx, val) => { gruposVariantes[idx].nome = val; };
  window.removerGrupo = (idx) => { gruposVariantes.splice(idx, 1); renderGrupos(); };
  window.removerTag   = (idx, ti) => { gruposVariantes[idx].tags.splice(ti, 1); renderGrupos(); };
  window.adicionarTag = (e, idx) => {
    if ((e.key === 'Enter' || e.key === ',') && e.target.value.trim()) {
      e.preventDefault();
      const val = e.target.value.trim().replace(/,/g, '');
      if (val && !gruposVariantes[idx].tags.includes(val)) {
        gruposVariantes[idx].tags.push(val);
        renderGrupos();
        setTimeout(() => document.getElementById(`tag-input-${idx}`)?.focus(), 0);
      } else { e.target.value = ''; }
    }
    if (e.key === 'Backspace' && !e.target.value && gruposVariantes[idx].tags.length) {
      gruposVariantes[idx].tags.pop(); renderGrupos();
    }
  };
 
  // ── SALVAR PRODUTO ────────────────────────────────────────
  window.salvarProduto = async (e) => {
    e.preventDefault();
    if (!usuarioAtual) return;
    const btn = document.getElementById('btn-submit-text');
    const id  = document.getElementById('prod-id').value;
 
    const dados = {
      name:        document.getElementById('prod-name').value.trim(),
      price:       parseFloat(document.getElementById('prod-price').value),
      categoria:   document.getElementById('prod-categoria').value,
      image:       document.getElementById('prod-image').value.trim(),
      descricao:   document.getElementById('prod-desc').value.trim(),
      variantes:   gruposVariantes.map(g => ({ nome: g.nome, opcoes: g.tags })),
      estoque:     parseInt(document.getElementById('prod-estoque').value) || 0,
      status:      document.getElementById('prod-status').value,
      vendedorUid: usuarioAtual.uid,
      vendedorEmail: usuarioAtual.email,
    };
 
    try {
      btn.textContent = 'Salvando...'; btn.disabled = true;
      if (id) {
        await updateDoc(doc(db, "loja_produtos", id), dados);
      } else {
        dados.createdAt = serverTimestamp();
        await addDoc(collection(db, "loja_produtos"), dados);
      }
      window.cancelarEdicao();
      await window.carregarProdutos();
      alert(id ? '✅ Produto atualizado!' : '✅ Produto adicionado à loja!');
    } catch (err) {
      console.error(err);
      alert('❌ Erro ao salvar: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = id ? 'Salvar Alterações' : 'Adicionar à Loja';
    }
  };
 
  // ── CARREGAR LISTA ────────────────────────────────────────
  window.carregarProdutos = async () => {
    if (!usuarioAtual) return;
    const container = document.getElementById('products-list');
    try {
      const q    = query(collection(db, "loja_produtos"), where("vendedorUid", "==", usuarioAtual.uid));
      const snap = await getDocs(q);
      container.innerHTML = '';
      produtosLocais = [];
      if (snap.empty) { container.innerHTML = '<p style="color:var(--muted)">Nenhum produto cadastrado.</p>'; return; }
      snap.forEach(docSnap => {
        const item = docSnap.data();
        produtosLocais.push({ id: docSnap.id, ...item });
        const variantes = (item.variantes || []).map(v => `${v.nome}: ${v.opcoes.join(', ')}`).join(' | ');
        const div = document.createElement('div');
        div.className = 'product-item';
        div.innerHTML = `
          <img class="product-item-img" src="${item.image || ''}" alt="${item.name}" onerror="this.style.display='none'">
          <div class="product-info">
            <h4>${item.name}</h4>
            <p>${item.categoria}${variantes ? ' · ' + variantes : ''} · Estoque: <strong style="color:${item.estoque === 0 ? 'var(--red)' : 'var(--green2)'}">${item.estoque !== undefined ? item.estoque : '—'}</strong></p>
          </div>
          <div class="product-meta">
            <span class="price-tag">R$ ${item.price.toFixed(2)}</span>
            <div class="action-btns">
              <button class="edit-btn" onclick="window.prepararEdicao('${docSnap.id}')">Editar</button>
              <button class="del-btn"  onclick="window.excluirProduto('${docSnap.id}', '${(item.name||'').replace(/'/g,"\\'")}')">Excluir</button>
            </div>
          </div>`;
        container.appendChild(div);
      });
    } catch (e) { container.innerHTML = '<p style="color:var(--red)">Erro ao buscar produtos.</p>'; }
  };
 
  // ── EDITAR ────────────────────────────────────────────────
  window.prepararEdicao = (id) => {
    const item = produtosLocais.find(p => p.id === id);
    if (!item) return;
    document.getElementById('prod-id').value        = id;
    document.getElementById('prod-name').value      = item.name      || '';
    document.getElementById('prod-price').value     = item.price     || '';
    document.getElementById('prod-categoria').value = item.categoria || 'Roupas';
    document.getElementById('prod-estoque').value   = item.estoque !== undefined ? item.estoque : '';
    document.getElementById('prod-status').value    = item.status    || 'ativo';
    document.getElementById('prod-image').value     = item.image     || '';
    document.getElementById('prod-desc').value      = item.descricao || '';
 
    // Recarrega grupos de variantes
    gruposVariantes = [];
    grupoIdCounter = 0;
    (item.variantes || []).forEach(v => window.adicionarGrupo(v.nome, v.opcoes));
 
    document.getElementById('form-title').textContent        = 'Editando Produto';
    document.getElementById('btn-submit-text').textContent   = 'Salvar Alterações';
    document.getElementById('btn-cancel-edit').style.display = 'block';
    document.getElementById('product-form').scrollIntoView({ behavior: 'smooth' });
  };
 
  window.cancelarEdicao = () => {
    document.getElementById('product-form').reset();
    document.getElementById('prod-id').value = '';
    gruposVariantes = []; grupoIdCounter = 0; renderGrupos();
    document.getElementById('form-title').textContent        = 'Novo Produto';
    document.getElementById('btn-submit-text').textContent   = 'Adicionar à Loja';
    document.getElementById('btn-cancel-edit').style.display = 'none';
  };
 
  // ── EXCLUIR ───────────────────────────────────────────────
  window.excluirProduto = async (id, nome) => {
    if (!confirm(`Excluir "${nome}" da loja?\n\nEssa ação não pode ser desfeita.`)) return;
    try {
      await deleteDoc(doc(db, "loja_produtos", id));
      await window.carregarProdutos();
    } catch (err) { alert('Erro ao excluir: ' + err.message); }
  };
 
  // ── PERFIL ────────────────────────────────────────────────
  window.abrirModalPerfil = async () => {
    document.getElementById('modal-perfil').style.display = 'flex';
    try {
      const userDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
      if (userDoc.exists()) {
        document.getElementById('perfil-nome').value = userDoc.data().name  || '';
        document.getElementById('perfil-foto').value = userDoc.data().photo || '';
      }
    } catch(_) {}
  };
  window.fecharModalPerfil = () => document.getElementById('modal-perfil').style.display = 'none';
 
  window.salvarPerfil = async (e) => {
    e.preventDefault();
    const user        = auth.currentUser;
    const currentPass = document.getElementById('current-pass').value;
    const newPass     = document.getElementById('new-pass').value;
    const confirmPass = document.getElementById('confirm-pass').value;
    try {
      await setDoc(doc(db, "users", user.uid), {
        name:  document.getElementById('perfil-nome').value,
        photo: document.getElementById('perfil-foto').value
      }, { merge: true });
      if (currentPass || newPass || confirmPass) {
        if (!currentPass || !newPass || !confirmPass) { alert("Preencha todos os campos de senha."); return; }
        if (newPass !== confirmPass) { alert("As senhas novas não coincidem!"); return; }
        if (newPass.length < 6) { alert("A nova senha deve ter pelo menos 6 caracteres."); return; }
        const cred = EmailAuthProvider.credential(user.email, currentPass);
        await reauthenticateWithCredential(user, cred);
        await updatePassword(user, newPass);
        alert("Perfil e senha atualizados!");
      } else { alert("Perfil atualizado!"); }
      window.fecharModalPerfil();
      document.getElementById('form-perfil')?.reset();
    } catch (err) {
      if (err.code === 'auth/wrong-password') alert("Senha atual incorreta.");
      else alert("Erro: " + err.message);
    }
  };
 
  window.fazerLogout = async () => {
    try { executandoLogout = true; await signOut(auth); location.href = 'index.html'; }
    catch (e) { executandoLogout = false; alert(e.message); }
  };
</script>
</body>
</html>
